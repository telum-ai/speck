# React + FastAPI + PostgreSQL Recipe
# Full-stack web application with Python backend

name: react-fastapi-postgres
display_name: "React + FastAPI + PostgreSQL"
description: "Full-stack web application with React frontend, FastAPI backend, and PostgreSQL database"
version: "1.0.0"

# Keywords for /speck detection
keywords:
  - react
  - fastapi
  - python backend
  - full stack web
  - postgresql
  - spa
  - web app
  - crud app
  - dashboard
  - admin panel

# Stack specification
stack:
  frontend:
    framework: react
    version: "18+"
    build_tool: vite
    language: typescript
    styling: tailwind
    state_management: 
      - zustand  # Simple cases
      - tanstack-query  # Server state
    testing: vitest
    
  backend:
    framework: fastapi
    version: "0.100+"
    language: python
    python_version: "3.11+"
    orm: sqlalchemy
    validation: pydantic-v2
    testing: pytest
    
  database:
    type: postgresql
    version: "15+"
    migrations: alembic
    
  auth:
    recommended: clerk
    alternatives:
      - stytch
      - auth0
      - custom-jwt
      
  deployment:
    recommended: railway
    alternatives:
      - render
      - docker-compose
      - aws-ecs

# Complexity assessment
complexity:
  level_range: "2-3"
  typical_team_size: "1-5"
  typical_timeline: "2-6 months"
  
# What this recipe is good for
ideal_for:
  - "B2B SaaS applications"
  - "Internal business tools"
  - "Data-driven dashboards"
  - "CRUD-heavy applications"
  - "Applications needing real-time features"
  - "Projects with complex business logic"

# What this recipe is NOT good for
not_ideal_for:
  - "Simple landing pages (use static-site)"
  - "Mobile-first apps (use expo-fastapi)"
  - "Serverless-first projects (use nextjs-supabase)"
  - "CLI tools (use cli-tool)"

# Common epics for this stack
suggested_epics:
  - id: E000-infrastructure
    name: "Developer Infrastructure"
    priority: 0
    phase: foundation
    stories_estimate: 3-5
    description: "Testing (pytest + Vitest), CI/CD pipeline, linting (Ruff + ESLint), error tracking (Sentry), environment config"
    
  - id: auth
    name: "Authentication & Authorization"
    priority: 1
    phase: mvp
    stories_estimate: 5-8
    description: "User login, registration, session management, role-based access"
    
  - id: user-management
    name: "User Management"
    priority: 1
    phase: mvp
    stories_estimate: 4-6
    description: "User profiles, settings, account management"
    
  - id: core-domain
    name: "Core Domain Features"
    priority: 1
    phase: mvp
    stories_estimate: 8-15
    description: "[CUSTOMIZE] Main business logic and features"
    
  - id: admin
    name: "Admin Dashboard"
    priority: 2
    phase: enhancement
    stories_estimate: 5-10
    description: "Administrative interface for managing users and data"
    optional: true
    
  - id: realtime
    name: "Real-time Features"
    priority: 2
    phase: enhancement
    stories_estimate: 4-8
    description: "WebSocket-based live updates, notifications"
    optional: true
    
  - id: integrations
    name: "External Integrations"
    priority: 3
    phase: future
    stories_estimate: 3-6
    description: "Third-party API integrations"
    optional: true

# External services to consider (Buy vs Build)
external_services:
  auth:
    recommended: clerk
    alternatives: [stytch, auth0]
    reason: "Fastest path to production auth for React; hosted sessions, good DX, and backend JWT verification patterns"
  payments:
    recommended: stripe
    alternatives: [paddle]
    reason: "Best API, 2.9% + $0.30"
  email:
    recommended: resend
    alternatives: [postmark, sendgrid]
    reason: "Modern DX, 3k emails free"
  file_storage:
    recommended: uploadcare
    alternatives: [cloudinary, s3]
    reason: "Upload widget, CDN included"
  error_tracking:
    recommended: sentry
    reason: "Python + React SDKs"
  analytics:
    recommended: posthog
    alternatives: [mixpanel]
    reason: "Open-source, self-hostable"
  search:
    recommended: meilisearch
    alternatives: [algolia, typesense]
    reason: "$30/mo, easy setup"

# Pre-configured patterns
patterns:
  api:
    - "RESTful with OpenAPI documentation"
    - "Request/response validation with Pydantic"
    - "Consistent error response format"
    - "API versioning (/v1/)"
    
  database:
    - "Alembic migrations with idempotent patterns"
    - "SQLAlchemy models as source of truth"
    - "Repository pattern for data access"
    
  frontend:
    - "Feature-based folder structure"
    - "TanStack Query for server state"
    - "React Hook Form for forms"
    - "Design system with Tailwind"
    
  testing:
    - "pytest for backend (unit + contract + integration)"
    - "Vitest for frontend (unit + component)"
    - "TDD workflow with skip markers"
    
  deployment:
    - "Environment-based configuration"
    - "Database migrations in pre-deploy"
    - "Health check endpoints"

# Architecture decisions pre-made
architecture:
  pattern: "Modular monolith"
  frontend_backend_split: true
  api_style: "REST"
  realtime_approach: "WebSocket (if needed)"
  
# Context pre-filled
context:
  technical:
    - "Python 3.11+ required"
    - "Node.js 18+ for frontend"
    - "PostgreSQL 15+ required"
  development:
    - "Git Flow or GitHub Flow"
    - "Conventional commits"
    - "Pre-commit hooks for linting"
  quality:
    - "95%+ test coverage for critical paths"
    - "Type safety (TypeScript + Pydantic)"


# Visual testing configuration
visual_testing:
  platform: web
  strategy: browser-mcp
  pattern_file: "visual-testing/web.mdc"
  breakpoints:
    mobile: 375
    tablet: 768
    desktop: 1024
    wide: 1280
  tools:
    primary: playwright
    storybook: true
    visual_regression: chromatic
  agent_commands:
    screenshot: "browser_take_screenshot"
    audit_a11y: "runAccessibilityAudit"
    audit_perf: "runPerformanceAudit"
    playwright_test: "npx playwright test"
    playwright_update: "npx playwright test --update-snapshots"
  ci_integration:
    on_pr: true
    block_on_diff: true
# v7 Evidence Contract defaults — what counts as proof for this platform.
# Override per-project in evidence-contract.md.
evidence_contract:
  platform: web
  valid_proof_sources:
    - "Production build (npm run build && start) screenshot via Playwright/Browser MCP"
    - "Production build accessibility tree via axe-playwright"
    - "Lighthouse run against production build"
    - "Live deployed URL screenshot + HAR"
    - "Network trace (HAR) showing real API responses"
  invalid_proof_sources:
    - "next dev / vite dev server screenshot (dev-mode evidence ≠ ship evidence)"
    - "Storybook screenshot (component evidence ≠ integrated evidence)"
    - "Screenshot from localhost without HAR"
    - "Curl of API without browser render"
    - "Screenshot of editor preview"
  required_larp_scope:
    impl_green: "Unit + integration tests pass"
    ux_rc: "Production build LARP: primary user flow recorded end-to-end with screenshots + AX tree at each step"
    commercial_rc: "Stripe checkout / paywall flow exercised against test mode, webhook delivery verified"
    ship_rc: "Live preview URL LARP recorded with HAR; auth flow on real provider"
    ship: "Production URL smoke screenshots checked in post-deploy"
  # CI-enforced gate registry (#88): seeds evidence-contract §6a via seed-gate-registry.sh.
  # validate-gate-liveness.sh diffs each declared stage against the committed hook/CI config.
  ci_gates:
    - id: frontend-unit
      command: npm run test
      stage: pre-push
      domain: frontend-tests
      canary: unit-tripwire
    - id: backend-tests
      command: pytest
      stage: ci:push
      domain: backend-tests
      canary: unit-tripwire
    - id: lint-typecheck
      command: eslint
      stage: pre-commit
      domain: lint
      canary: lint-error
    - id: banned-language
      command: .speck/scripts/banned-language-lint.sh
      stage: pre-commit
      domain: copy
      canary: banned-language
  required_static_evidence:
    - "tests passing in CI"
    - "Lighthouse score >=85 for performance, accessibility"
    - "axe-core 0 critical, 0 serious"
    - "Sentry test event roundtrip"
  required_live_service_evidence:
    - "Production deploy URL responding 200"
    - "Auth callback flow against real OAuth provider"
    - "Email sending verified (test inbox)"
    - "Stripe webhook delivery verified (if billing in scope)"
