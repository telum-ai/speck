# Static Site Recipe
# Marketing sites, documentation, blogs

name: static-site
display_name: "Static Site"
description: "Marketing site, documentation, or blog with static generation"
version: "1.0.0"

# Keywords for /speck detection
keywords:
  - static site
  - marketing site
  - landing page
  - documentation
  - docs
  - blog
  - portfolio
  - content site
  - jamstack

# Stack specification
stack:
  framework_options:
    astro:
      version: "4+"
      content: mdx
      styling: tailwind
      deployment: vercel
      
    nextjs-static:
      version: "14+"
      export: static
      content: mdx
      styling: tailwind
      deployment: vercel

# Complexity assessment
complexity:
  level_range: "1"
  typical_team_size: "1-2"
  typical_timeline: "1-4 weeks"
  
# What this recipe is good for
ideal_for:
  - "Company marketing sites"
  - "Product landing pages"
  - "Developer documentation"
  - "Personal portfolios"
  - "Blogs and content sites"
  - "Open source project sites"

# What this recipe is NOT good for
not_ideal_for:
  - "Dynamic web apps (use react-fastapi-postgres)"
  - "User authentication flows"
  - "Complex data interactions"
  - "Real-time features"

# Common epics for this stack
suggested_epics:
  - id: E000-infrastructure
    name: "Developer Infrastructure"
    priority: 0
    phase: foundation
    stories_estimate: 2-3
    description: "CI/CD pipeline (Vercel/Netlify preview deploys), linting (ESLint + Prettier), accessibility testing setup"
    optional_for_simple_sites: true
    
  - id: structure
    name: "Site Structure"
    priority: 1
    phase: mvp
    stories_estimate: 2-4
    description: "Navigation, layout, header/footer, routing"
    
  - id: pages
    name: "Content Pages"
    priority: 1
    phase: mvp
    stories_estimate: 4-8
    description: "[CUSTOMIZE] Main site pages (home, about, features, etc.)"
    
  - id: blog
    name: "Blog/News"
    priority: 2
    phase: enhancement
    stories_estimate: 3-5
    description: "Blog posts, categories, RSS feed"
    optional: true
    
  - id: forms
    name: "Contact & Forms"
    priority: 2
    phase: mvp
    stories_estimate: 2-3
    description: "Contact forms, newsletter signup, form handling"
    optional: true
    
  - id: seo
    name: "SEO & Analytics"
    priority: 1
    phase: mvp
    stories_estimate: 2-3
    description: "Meta tags, sitemap, analytics integration"

# External services to consider (Buy vs Build)
external_services:
  cms:
    recommended: sanity
    alternatives: [contentful, storyblok]
    reason: "Headless, great DX, generous free tier"
  forms:
    recommended: formspree
    alternatives: [basin, netlify-forms]
    reason: "No backend needed"
  analytics:
    recommended: plausible
    alternatives: [fathom, umami]
    reason: "Privacy-first, simple, GDPR-friendly"
  search:
    recommended: algolia-docsearch
    alternatives: [pagefind]
    reason: "Free for docs/OSS"
  newsletter:
    recommended: buttondown
    alternatives: [convertkit, mailchimp]
    reason: "Simple, markdown-first"
  comments:
    recommended: giscus
    alternatives: [disqus, utterances]
    reason: "GitHub-based, free, no tracking"
  images:
    recommended: cloudinary
    alternatives: [imgix]
    reason: "Auto-optimization, free tier"

# Pre-configured patterns
patterns:
  content:
    - "MDX for rich content"
    - "Frontmatter for metadata"
    - "Content collections"
    - "Image optimization"
    
  seo:
    - "Meta tags per page"
    - "Open Graph images"
    - "Sitemap generation"
    - "Robots.txt"
    
  performance:
    - "Static generation"
    - "Image optimization"
    - "Minimal JavaScript"
    - "Edge CDN deployment"
    
  forms:
    - "Formspree or similar service"
    - "Email notifications"
    - "Spam protection"

# Architecture decisions pre-made
architecture:
  pattern: "Static Site Generation (SSG)"
  content_source: "MDX files or headless CMS"
  forms: "Third-party form service"
  hosting: "Edge CDN"
  
# Context pre-filled
context:
  technical:
    - "Node.js 18+ required"
    - "Content in MDX or CMS"
  development:
    - "Preview deployments on PR"
    - "Content preview locally"
  quality:
    - "Core Web Vitals optimized"
    - "Accessibility (WCAG 2.1 AA)"
    - "Mobile-first responsive"


# Visual testing configuration
visual_testing:
  platform: web
  strategy: browser-mcp
  pattern_file: "visual-testing/web.mdc"
  breakpoints:
    mobile: 375
    tablet: 768
    desktop: 1024
    wide: 1280
  tools:
    primary: playwright
    storybook: false
    visual_regression: percy
  agent_commands:
    screenshot: "browser_take_screenshot"
    audit_a11y: "runAccessibilityAudit"
    audit_perf: "runPerformanceAudit"
    playwright_test: "npx playwright test"
    playwright_update: "npx playwright test --update-snapshots"
  ci_integration:
    on_pr: true
    block_on_diff: true
# v7 Evidence Contract defaults — what counts as proof for this platform.
# Override per-project in evidence-contract.md.
evidence_contract:
  platform: web
  valid_proof_sources:
    - "Production build (npm run build && start) screenshot via Playwright/Browser MCP"
    - "Production build accessibility tree via axe-playwright"
    - "Lighthouse run against production build"
    - "Live deployed URL screenshot + HAR"
    - "Network trace (HAR) showing real API responses"
  invalid_proof_sources:
    - "next dev / vite dev server screenshot (dev-mode evidence ≠ ship evidence)"
    - "Storybook screenshot (component evidence ≠ integrated evidence)"
    - "Screenshot from localhost without HAR"
    - "Curl of API without browser render"
    - "Screenshot of editor preview"
  required_larp_scope:
    impl_green: "Unit + integration tests pass"
    ux_rc: "Production build LARP: primary user flow recorded end-to-end with screenshots + AX tree at each step"
    commercial_rc: "Stripe checkout / paywall flow exercised against test mode, webhook delivery verified"
    ship_rc: "Live preview URL LARP recorded with HAR; auth flow on real provider"
    ship: "Production URL smoke screenshots checked in post-deploy"
  # CI-enforced gate registry (#88): seeds evidence-contract §6a via seed-gate-registry.sh.
  ci_gates:
    - id: eslint
      command: eslint
      stage: pre-commit
      domain: lint
    - id: a11y
      command: npx playwright test
      stage: ci:push
      domain: a11y
    - id: banned-language
      command: .speck/scripts/banned-language-lint.sh
      stage: pre-commit
      domain: copy
      canary: banned-language
  required_static_evidence:
    - "tests passing in CI"
    - "Lighthouse score >=85 for performance, accessibility"
    - "axe-core 0 critical, 0 serious"
    - "Sentry test event roundtrip"
  required_live_service_evidence:
    - "Production deploy URL responding 200"
    - "Auth callback flow against real OAuth provider"
    - "Email sending verified (test inbox)"
    - "Stripe webhook delivery verified (if billing in scope)"
