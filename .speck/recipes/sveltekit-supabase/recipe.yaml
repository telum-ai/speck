name: sveltekit-supabase
display_name: "SvelteKit + Supabase"
description: A modern, performant full-stack web application using SvelteKit for the frontend/API and Supabase for backend services. Excellent developer experience with fast builds and minimal boilerplate.
version: "1.0.0"
keywords:
  - web
  - full-stack
  - svelte
  - sveltekit
  - supabase
  - postgresql
  - javascript
  - typescript
  - serverless
stack:
  frontend:
    name: SvelteKit
    language: TypeScript
    framework: Svelte
    styling: Tailwind CSS / Skeleton UI
  backend:
    name: SvelteKit API Routes + Supabase
    language: TypeScript / PostgreSQL
    framework: SvelteKit
    orm: Supabase Client
  database:
    name: PostgreSQL (via Supabase)
    version: "15"
suggested_epics:
  - name: Developer Infrastructure
    description: Testing (Vitest + Playwright), CI/CD pipeline (GitHub Actions + Vercel), linting (ESLint + Prettier), error tracking (Sentry)
    stories_estimate: 3-5
    priority: 0
    phase: foundation
    
  - name: Authentication & User Management
    description: Implement user registration, login, social auth, and profile management using Supabase Auth.
    stories_estimate: 6-9
  - name: Core Data Management
    description: Build CRUD operations for primary data models with real-time subscriptions.
    stories_estimate: 8-12
  - name: Server-Side Rendering & SEO
    description: Optimize for search engines with SSR, meta tags, and structured data.
    stories_estimate: 4-6
pre_configured_patterns:
  - name: SvelteKit Form Actions
    description: Server-side form handling with progressive enhancement.
  - name: Supabase Row Level Security
    description: Database-level authorization using RLS policies.
  - name: SvelteKit Load Functions
    description: Efficient data loading with parallel requests and caching.

# Visual testing configuration
visual_testing:
  platform: web
  strategy: browser-mcp
  pattern_file: "visual-testing/web.mdc"
  breakpoints:
    mobile: 375
    tablet: 768
    desktop: 1024
    wide: 1280
  tools:
    primary: playwright
    storybook: true
    visual_regression: chromatic
  agent_commands:
    screenshot: "browser_take_screenshot"
    audit_a11y: "runAccessibilityAudit"
    audit_perf: "runPerformanceAudit"
    playwright_test: "npx playwright test"
    playwright_update: "npx playwright test --update-snapshots"
  ci_integration:
    on_pr: true
    block_on_diff: true
# v7 Evidence Contract defaults — what counts as proof for this platform.
# Override per-project in evidence-contract.md.
evidence_contract:
  platform: web
  valid_proof_sources:
    - "Production build (npm run build && start) screenshot via Playwright/Browser MCP"
    - "Production build accessibility tree via axe-playwright"
    - "Lighthouse run against production build"
    - "Live deployed URL screenshot + HAR"
    - "Network trace (HAR) showing real API responses"
  invalid_proof_sources:
    - "next dev / vite dev server screenshot (dev-mode evidence ≠ ship evidence)"
    - "Storybook screenshot (component evidence ≠ integrated evidence)"
    - "Screenshot from localhost without HAR"
    - "Curl of API without browser render"
    - "Screenshot of editor preview"
  required_larp_scope:
    impl_green: "Unit + integration tests pass"
    ux_rc: "Production build LARP: primary user flow recorded end-to-end with screenshots + AX tree at each step"
    commercial_rc: "Stripe checkout / paywall flow exercised against test mode, webhook delivery verified"
    ship_rc: "Live preview URL LARP recorded with HAR; auth flow on real provider"
    ship: "Production URL smoke screenshots checked in post-deploy"
  # CI-enforced gate registry (#88): seeds evidence-contract §6a via seed-gate-registry.sh.
  ci_gates:
    - id: unit
      command: vitest run
      stage: pre-push
      domain: tests
    - id: e2e
      command: npx playwright test
      stage: ci:push
      domain: e2e
    - id: svelte-check
      command: svelte-check
      stage: pre-commit
      domain: lint
    - id: banned-language
      command: .speck/scripts/banned-language-lint.sh
      stage: pre-commit
      domain: copy
      canary: banned-language
  required_static_evidence:
    - "tests passing in CI"
    - "Lighthouse score >=85 for performance, accessibility"
    - "axe-core 0 critical, 0 serious"
    - "Sentry test event roundtrip"
  required_live_service_evidence:
    - "Production deploy URL responding 200"
    - "Auth callback flow against real OAuth provider"
    - "Email sending verified (test inbox)"
    - "Stripe webhook delivery verified (if billing in scope)"
